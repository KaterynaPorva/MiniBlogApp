name: Generate and Deploy Doxygen Docs

on:
  push:
    branches:
      - master  # Додано твою основну гілку
      - main    # Про всяк випадок, якщо назва зміниться
  workflow_dispatch: # Дозволяє запустити вручну кнопкою на GitHub

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Оновлено до 4 версії
        with:
          submodules: true

      - name: Install Doxygen and Graphviz
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Generate Doxygen documentation
        run: doxygen Doxyfile

      - name: Create .nojekyll
        # Це важливо, щоб GitHub Pages бачив папки Doxygen
        run: touch html/.nojekyll 

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # Використовуємо автоматичний токен
          publish_dir: ./html # Змінено на стандартну папку Doxygen
